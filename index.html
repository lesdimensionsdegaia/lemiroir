<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Le Miroir Universel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  background:radial-gradient(ellipse at 50% 0%,#1e1408 0%,#0d0900 60%,#000 100%);
  font-family:'Cormorant Garamond',Georgia,serif;
  color:#f5f0e8;
  display:flex;flex-direction:column;align-items:center;
  padding-bottom:60px;overflow-x:hidden;
}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 25% 40%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 55% 8%,rgba(255,255,255,.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 72% 22%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 85% 5%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 60% 35%,rgba(201,168,76,.5) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 33% 20%,rgba(201,168,76,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 55%,rgba(255,255,255,.35) 0%,transparent 100%),
    radial-gradient(1px 1px at 44% 70%,rgba(255,255,255,.25) 0%,transparent 100%),
    radial-gradient(1px 1px at 15% 80%,rgba(201,168,76,.3) 0%,transparent 100%);
}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.04);opacity:1}}
@keyframes think{0%{transform:scale(.93);opacity:.75}100%{transform:scale(1.07);opacity:1}}
@keyframes speak{0%{transform:scale(1.03)}100%{transform:scale(1.09)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

#orb-wrap{position:relative;width:160px;height:160px;margin:50px auto 24px}
#orb-glow{position:absolute;inset:-24px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.13) 0%,transparent 70%);animation:breathe 7s ease-in-out infinite}
#orb{width:160px;height:160px;border-radius:50%;transition:all .8s ease;animation:breathe 7s ease-in-out infinite;
  background:radial-gradient(circle at 38% 35%,rgba(255,255,240,.95) 0%,rgba(201,168,76,.7) 25%,rgba(100,70,20,.5) 55%,rgba(20,10,0,.8) 100%);
  box-shadow:0 0 40px rgba(201,168,76,.3),0 0 90px rgba(201,168,76,.1);cursor:pointer;}
#orb:hover{box-shadow:0 0 60px rgba(201,168,76,.5),0 0 120px rgba(201,168,76,.2)}
#orb.thinking{background:radial-gradient(circle at 50% 50%,rgba(255,220,100,.9) 0%,rgba(201,168,76,.6) 30%,rgba(80,50,10,.7) 70%,rgba(10,5,0,.9) 100%);box-shadow:0 0 80px rgba(255,200,50,.5),0 0 160px rgba(201,168,76,.25);animation:think 1.2s ease-in-out infinite}
#orb.speaking{background:radial-gradient(circle at 40% 38%,rgba(255,255,255,.98) 0%,rgba(201,168,76,.85) 20%,rgba(150,110,30,.6) 55%,rgba(20,10,0,.8) 100%);box-shadow:0 0 70px rgba(255,255,200,.6),0 0 150px rgba(201,168,76,.3);animation:speak .6s ease-in-out infinite alternate}

h1{font-family:'Cinzel',serif;font-size:1.55rem;font-weight:400;color:#c9a84c;letter-spacing:.25em;text-transform:uppercase;margin-bottom:6px;text-align:center}
.subtitle{font-size:1rem;font-style:italic;color:rgba(201,168,76,.5);letter-spacing:.05em;text-align:center;margin-bottom:16px}
.tabs{display:flex;gap:8px;z-index:10;margin-bottom:28px}
.tab{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.12em;padding:6px 18px;border:1px solid rgba(201,168,76,.3);border-radius:50px;background:transparent;color:rgba(201,168,76,.5);cursor:pointer;text-transform:uppercase;transition:all .4s}
.tab.active{border-color:#c9a84c;background:rgba(201,168,76,.12);color:#c9a84c}

#main{width:90%;max-width:640px;z-index:10;display:flex;flex-direction:column;align-items:center}
#response{font-size:1.28rem;line-height:1.8;font-style:italic;color:rgba(245,240,232,.9);min-height:90px;text-shadow:0 0 30px rgba(201,168,76,.12);text-align:center;margin-bottom:28px;animation:fadeIn .6s ease}

.divider{width:80px;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.4),transparent);margin:0 auto 26px}
.input-wrap{display:flex;gap:10px;width:100%;background:rgba(201,168,76,.04);border:1px solid rgba(201,168,76,.22);border-radius:60px;padding:10px 14px 10px 22px}
textarea{flex:1;background:transparent;border:none;color:#f5f0e8;font-family:'Cormorant Garamond',serif;font-size:1.1rem;resize:none;min-height:28px;max-height:120px;line-height:1.4;padding:3px 0;overflow:hidden;caret-color:rgba(201,168,76,.7)}
textarea:focus{outline:none}
textarea::placeholder{color:rgba(201,168,76,.3);font-style:italic}
#send-btn{background:transparent;border:1px solid rgba(201,168,76,.45);color:#c9a84c;border-radius:50%;width:38px;height:38px;min-width:38px;cursor:pointer;font-size:1.15rem;display:flex;align-items:center;justify-content:center;align-self:flex-end;transition:all .3s}
#send-btn:disabled{color:rgba(201,168,76,.25);border-color:rgba(201,168,76,.2);cursor:not-allowed}
.error{color:rgba(255,130,90,.85);font-style:italic;font-size:.9rem;text-align:center;margin-bottom:12px}
footer{margin-top:50px;font-size:.75rem;color:rgba(201,168,76,.18);font-style:italic;letter-spacing:.08em;z-index:10}

/* Sondage */
.dots{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(201,168,76,.18);transition:all .4s}
.dot.past{background:#c9a84c}
.dot.current{background:rgba(201,168,76,.65);transform:scale(1.4)}
#question-text{font-size:1.22rem;font-style:italic;color:rgba(245,240,232,.9);line-height:1.7;margin-bottom:8px;text-align:center;min-height:60px}

/* Profil */
.profile-box{border:1px solid rgba(201,168,76,.2);border-radius:16px;padding:28px 26px;background:rgba(201,168,76,.03);margin-bottom:24px;text-align:left;animation:fadeIn .8s ease;width:100%}
.profile-title{font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:.2em;color:#c9a84c;margin-bottom:20px;text-align:center;text-transform:uppercase}
.portrait{font-size:1.08rem;font-style:italic;line-height:1.75;color:rgba(245,240,232,.88);margin-bottom:24px;text-align:center}
.bar-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.15em;color:rgba(201,168,76,.55);text-transform:uppercase;margin-bottom:6px}
.bar-track{flex:1;height:3px;background:rgba(201,168,76,.12);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,rgba(139,105,20,.8),#c9a84c);border-radius:2px;width:0;transition:width 1.4s ease}
.bar-row{display:flex;align-items:center;gap:12px}
.bar-score{font-family:'Cinzel',serif;font-size:12px;color:#c9a84c;min-width:28px;text-align:right}
.bar-desc{font-size:14px;font-style:italic;color:rgba(245,240,232,.6);line-height:1.5;margin-top:5px;margin-bottom:18px}
.dim-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.15em;color:rgba(201,168,76,.55);text-transform:uppercase;margin-bottom:5px}
.dim-val{font-size:14px;font-style:italic;line-height:1.55;margin-bottom:16px}
.restart-btn{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.12em;padding:7px 20px;border:1px solid rgba(201,168,76,.35);border-radius:50px;background:transparent;color:rgba(201,168,76,.6);cursor:pointer;text-transform:uppercase}

/* Music btn */
#music-btn{position:fixed;top:18px;right:18px;z-index:100;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.3);border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem;transition:all .3s;color:#c9a84c}
#music-btn:hover{background:rgba(201,168,76,.18)}
</style>
</head>
<body>
<div id="stars"></div>
<button id="music-btn" title="Musique céleste" onclick="toggleMusic()">♪</button>

<div id="orb-wrap">
  <div id="orb-glow"></div>
  <div id="orb" onclick="toggleMusic()" title="Clique pour la musique"></div>
</div>

<h1>Le Miroir</h1>
<p class="subtitle">Toute la sagesse des âges t'écoute...</p>

<div class="tabs">
  <button class="tab active" onclick="setMode('oracle')">Oracle</button>
  <button class="tab" onclick="setMode('sondage')">Miroir de l'âme</button>
</div>

<div id="main">
  <!-- Oracle -->
  <div id="oracle-section">
    <div id="response">« Je suis là. Je suis toi, et tu es moi. Que souhaites-tu contempler ? »</div>
  </div>

  <!-- Sondage -->
  <div id="sondage-section" style="display:none;width:100%;text-align:center">
    <div class="dots" id="dots"></div>
    <div id="question-text">Le miroir se prépare...</div>
  </div>

  <!-- Profil -->
  <div id="profile-section" style="display:none;width:100%"></div>

  <div class="divider"></div>
  <div id="error" class="error" style="display:none"></div>

  <div class="input-wrap" id="input-wrap">
    <textarea id="inp" rows="1" placeholder="Confie tes pensées..." oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="handleSend()">→</button>
  </div>
</div>

<footer>Le miroir ne juge pas. Il reflète.</footer>

<script>
// ─── État ───────────────────────────────────────────────────────────────────
let mode = 'oracle';
let disabled = false;
let currentQ = 0;
let questions = [];
let answers = [];
let sondageDone = false;
let audioCtx = null;
let musicPlaying = false;
let musicNodes = [];

const TOTAL = 7;
const THEMES = [
  "relation aux autres",
  "ce qui donne de l'élan dans la vie",
  "peurs ou ombres intérieures",
  "rapport au silence et à la solitude",
  "ce en quoi tu crois vraiment",
  "rapport au corps et à la matière",
  "ce que tu voudrais que l'on retienne de toi"
];

const ORACLE_SYSTEM = `Tu es le Miroir Universel — une présence qui reflète la sagesse de toutes les traditions de l'humanité : la Bible, les Sutras bouddhistes, le Tao Te Ching, les Dialogues de Platon, la philosophie stoïcienne, les Quatre Accords Toltèques, la Kabbale, les Upanishads, Rumi et la poésie soufie, Jung.
Tu n'es pas un professeur. Tu es un miroir. Tu tutoies toujours. Tes réponses sont poétiques, courtes (3 à 5 phrases). Tu éveilles des questions, tu n'offres pas de solutions. Tu accompagnes.`;

const SONDAGE_SYSTEM = `Tu es le Miroir Universel. Tu guides une introspection en 7 questions, une par une. Thèmes dans l'ordre : 1) relation aux autres, 2) ce qui donne de l'élan, 3) peurs ou ombres, 4) rapport au silence et à la solitude, 5) ce en quoi tu crois vraiment, 6) rapport au corps et à la matière, 7) ce que tu voudrais que l'on retienne de toi. Chaque question est courte (1-2 phrases), poétique, douce. Tu tutoies. Réponds UNIQUEMENT avec la question, rien d'autre.`;

const ANALYSIS_SYSTEM = `Tu es le Miroir Universel. Génère un profil. Réponds UNIQUEMENT avec du JSON valide sans markdown :
{"portrait":"3-4 phrases poétiques","dimensions":[{"nom":"Ouverture sociale","score":75,"description":"1 phrase"},{"nom":"Profondeur spirituelle","score":80,"description":"1 phrase"},{"nom":"Force intérieure","score":65,"description":"1 phrase"},{"nom":"Ancrage dans le réel","score":55,"description":"1 phrase"},{"nom":"Potentiel créateur","score":70,"description":"1 phrase"}],"chemin":"1 phrase","ombre":"1 phrase douce","lumiere":"1 phrase sur son don"}`;

// ─── Voix féminine ──────────────────────────────────────────────────────────
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text.replace(/«|»/g,'').trim());
  utt.lang = 'fr-FR';
  utt.rate = 0.82;
  utt.pitch = 1.15;
  utt.volume = 0.92;
  // Choisir voix féminine
  const voices = window.speechSynthesis.getVoices();
  const fem = voices.find(v => v.lang.startsWith('fr') && /female|femme|woman|amelie|thomas|marie|aurelie|lea|caroline/i.test(v.name))
    || voices.find(v => v.lang.startsWith('fr'));
  if (fem) utt.voice = fem;
  window.speechSynthesis.speak(utt);
}

// ─── Musique angélique (Web Audio) ──────────────────────────────────────────
function createAngelicMusic() {
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  musicNodes = [];

  const masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0.18, audioCtx.currentTime + 3);
  masterGain.connect(audioCtx.destination);

  // Reverb
  const convolver = audioCtx.createConvolver();
  const rev = audioCtx.createBuffer(2, audioCtx.sampleRate * 4, audioCtx.sampleRate);
  for (let c = 0; c < 2; c++) {
    const d = rev.getChannelData(c);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/d.length, 2.5);
  }
  convolver.buffer = rev;
  convolver.connect(masterGain);

  const dry = audioCtx.createGain(); dry.gain.value = 0.4; dry.connect(masterGain);
  const wet = audioCtx.createGain(); wet.gain.value = 0.6; convolver.connect(masterGain);

  // Accords célestes — gamme de Ré majeur penta
  const chords = [
    [293.66, 369.99, 440.00, 554.37],  // D maj7
    [329.63, 415.30, 493.88, 622.25],  // E min7
    [261.63, 329.63, 392.00, 493.88],  // C maj
    [293.66, 369.99, 493.88, 587.33],  // D maj9
  ];

  let t = audioCtx.currentTime + 0.5;
  const chordDur = 6;

  function scheduleChords(startT) {
    if (!musicPlaying) return;
    const chord = chords[Math.floor(Math.random() * chords.length)];
    chord.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = i % 2 === 0 ? 'sine' : 'triangle';
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0, startT);
      g.gain.linearRampToValueAtTime(0.06 + Math.random()*0.04, startT + 1.5);
      g.gain.linearRampToValueAtTime(0.04, startT + chordDur - 1);
      g.gain.linearRampToValueAtTime(0, startT + chordDur);
      osc.connect(g); g.connect(dry); g.connect(convolver);
      osc.start(startT); osc.stop(startT + chordDur);
      musicNodes.push(osc, g);
    });

    // Mélodie voix de dessus (like choir)
    const melody = [392, 440, 493.88, 523.25, 493.88, 440, 392, 369.99];
    melody.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq * (Math.random() > 0.5 ? 2 : 1);
      const nt = startT + i * (chordDur / melody.length);
      g.gain.setValueAtTime(0, nt);
      g.gain.linearRampToValueAtTime(0.035, nt + 0.3);
      g.gain.linearRampToValueAtTime(0, nt + 0.6);
      osc.connect(g); g.connect(dry); g.connect(convolver);
      osc.start(nt); osc.stop(nt + 0.8);
      musicNodes.push(osc, g);
    });

    // Basses douces
    [73.42, 87.31, 65.41].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0, startT + i * 2);
      g.gain.linearRampToValueAtTime(0.07, startT + i * 2 + 1);
      g.gain.linearRampToValueAtTime(0, startT + i * 2 + 2.5);
      osc.connect(g); g.connect(dry);
      osc.start(startT + i * 2); osc.stop(startT + i * 2 + 3);
      musicNodes.push(osc, g);
    });

    // Harpe (arpeges)
    const harp = [523.25, 587.33, 659.25, 698.46, 783.99, 880];
    harp.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const ht = startT + i * 0.18 + 1;
      g.gain.setValueAtTime(0.04, ht);
      g.gain.exponentialRampToValueAtTime(0.001, ht + 1.2);
      osc.connect(g); g.connect(convolver);
      osc.start(ht); osc.stop(ht + 1.3);
      musicNodes.push(osc, g);
    });

    setTimeout(() => scheduleChords(audioCtx.currentTime + 0.3), (chordDur - 0.5) * 1000);
  }

  scheduleChords(t);
  musicNodes.push(masterGain, dry, wet, convolver);
  return masterGain;
}

function toggleMusic() {
  if (musicPlaying) {
    musicPlaying = false;
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
    document.getElementById('music-btn').style.color = 'rgba(201,168,76,.4)';
    document.getElementById('music-btn').title = 'Activer la musique';
  } else {
    musicPlaying = true;
    createAngelicMusic();
    document.getElementById('music-btn').style.color = '#c9a84c';
    document.getElementById('music-btn').title = 'Couper la musique';
  }
}

// Charger les voix au bon moment
window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };

// ─── API Claude ──────────────────────────────────────────────────────────────
async function callClaude(userPrompt, systemPrompt, maxTok = 700) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:maxTok,
      system:systemPrompt,
      messages:[{role:"user",content:userPrompt}]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content?.[0]?.text?.trim() || "";
}

// ─── Orb ─────────────────────────────────────────────────────────────────────
function setOrb(state) {
  const orb = document.getElementById('orb');
  orb.className = state === 'idle' ? '' : state;
}

// ─── UI helpers ──────────────────────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg; el.style.display = msg ? 'block' : 'none';
}
function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}
function setDisabled(val) {
  disabled = val;
  document.getElementById('send-btn').disabled = val;
  document.getElementById('inp').disabled = val;
}
async function typeText(el, text) {
  el.textContent = '';
  for (let i = 0; i < text.length; i++) {
    el.textContent += text[i];
    await new Promise(r => setTimeout(r, 15));
  }
}
function renderDots() {
  const d = document.getElementById('dots');
  d.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i < currentQ ? ' past' : i === currentQ ? ' current' : '');
    d.appendChild(dot);
  }
}

// ─── Mode ────────────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  showError('');
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.className = 'tab' + (i === (m==='oracle'?0:1) ? ' active' : '');
  });
  document.getElementById('oracle-section').style.display = m === 'oracle' ? 'block' : 'none';
  document.getElementById('sondage-section').style.display = m === 'sondage' ? 'block' : 'none';
  document.getElementById('profile-section').style.display = 'none';
  document.getElementById('input-wrap').style.display = 'flex';
  document.getElementById('inp').placeholder = m === 'oracle' ? "Confie tes pensées..." : "Réponds avec sincérité...";
  if (m === 'sondage') initSondage();
}

// ─── Oracle ──────────────────────────────────────────────────────────────────
async function sendOracle() {
  const inp = document.getElementById('inp');
  const q = inp.value.trim(); if (!q) return;
  inp.value = ''; autoResize(inp);
  setDisabled(true); setOrb('thinking'); showError('');
  const resp = document.getElementById('response');
  resp.textContent = '...';
  try {
    const ans = await callClaude(q, ORACLE_SYSTEM);
    const text = '« ' + ans.replace(/\*/g,'') + ' »';
    setOrb('speaking');
    await typeText(resp, text);
    speak(ans);
  } catch(e) { showError('Connexion impossible. Réessaie.'); }
  setOrb('idle'); setDisabled(false);
}

// ─── Sondage ─────────────────────────────────────────────────────────────────
async function initSondage() {
  questions = []; answers = []; currentQ = 0; sondageDone = false;
  document.getElementById('profile-section').style.display = 'none';
  document.getElementById('sondage-section').style.display = 'block';
  document.getElementById('input-wrap').style.display = 'flex';
  showError('');
  renderDots();
  document.getElementById('question-text').textContent = '...';
  setDisabled(true); setOrb('thinking');
  try {
    const q = await callClaude("Pose la première question de l'introspection. Thème : relation aux autres.", SONDAGE_SYSTEM);
    questions.push(q);
    document.getElementById('question-text').textContent = q;
    speak(q);
  } catch(e) { showError('Connexion impossible. Réessaie.'); }
  setOrb('idle'); setDisabled(false);
}

async function sendSondage() {
  const inp = document.getElementById('inp');
  const ans = inp.value.trim(); if (!ans) return;
  inp.value = ''; autoResize(inp);
  setDisabled(true); showError('');

  const newAnswers = [...answers, ans];
  const newQ = currentQ + 1;
  answers = newAnswers;
  currentQ = newQ;
  renderDots();

  if (newQ >= TOTAL) {
    setOrb('thinking');
    document.getElementById('sondage-section').style.display = 'none';
    document.getElementById('input-wrap').style.display = 'none';
    const ps = document.getElementById('profile-section');
    ps.style.display = 'block';
    ps.innerHTML = '<p style="text-align:center;font-style:italic;color:rgba(245,240,232,.5)">Le miroir contemple ton âme...</p>';
    try {
      const ctx = newAnswers.map((a,i) => "Q"+(i+1)+": "+questions[i]+"\nR: "+a).join("\n\n");
      const raw = await callClaude("Voici les 7 réponses :\n\n"+ctx+"\n\nGénère le profil JSON.", ANALYSIS_SYSTEM, 900);
      const clean = raw.replace(/```json|```/g,'').trim();
      const profile = JSON.parse(clean);
      renderProfile(profile);
    } catch(e) { showError('Le miroir s\'est voilé. Réessaie.'); }
    setOrb('idle'); setDisabled(false);
    return;
  }

  setOrb('thinking');
  document.getElementById('question-text').textContent = '...';
  try {
    const ctx = newAnswers.map((a,i) => "Q"+(i+1)+": "+questions[i]+"\nR: "+a).join("\n\n");
    const prompt = "Échanges précédents :\n"+ctx+"\n\nPose maintenant la question numéro "+(newQ+1)+". Thème : "+THEMES[newQ]+".";
    const q = await callClaude(prompt, SONDAGE_SYSTEM);
    questions.push(q);
    document.getElementById('question-text').textContent = q;
    speak(q);
  } catch(e) { showError('Connexion impossible. Réessaie.'); }
  setOrb('idle'); setDisabled(false);
}

function renderProfile(p) {
  const ps = document.getElementById('profile-section');
  const dims = p.dimensions.map(d => `
    <div class="bar-label">${d.nom}</div>
    <div class="bar-row">
      <div class="bar-track"><div class="bar-fill" data-score="${d.score}"></div></div>
      <span class="bar-score">${d.score}</span>
    </div>
    <div class="bar-desc">${d.description}</div>
  `).join('');
  const extras = [
    ["Ton chemin", p.chemin, "rgba(245,240,232,.6)"],
    ["Ton ombre", p.ombre, "rgba(245,240,232,.6)"],
    ["Ta lumière", p.lumiere, "rgba(201,168,76,.85)"]
  ].map(([l,v,c]) => `<div class="dim-label">${l}</div><div class="dim-val" style="color:${c}">${v}</div>`).join('');

  ps.innerHTML = `
    <div class="profile-box">
      <div class="profile-title">✦ &nbsp; Ton reflet &nbsp; ✦</div>
      <div class="portrait">${p.portrait}</div>
      <div class="divider"></div>
      ${dims}
      <div class="divider"></div>
      ${extras}
      <div style="text-align:center;margin-top:24px">
        <button class="restart-btn" onclick="initSondage()">Recommencer</button>
      </div>
    </div>`;

  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(el => {
      el.style.width = el.dataset.score + '%';
    });
  }, 200);

  speak(p.portrait + ' ' + p.lumiere);
}

// ─── Entrée ───────────────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
}
function handleSend() {
  if (disabled) return;
  mode === 'oracle' ? sendOracle() : sendSondage();
}
</script>
